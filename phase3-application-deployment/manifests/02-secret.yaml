# HOW TO USE:
# 1. Copy this file: cp 02-secret.yaml 02-secret.local.yaml
# 2. Replace all <PLACEHOLDER> values with your actual credentials
# 3. Apply the local copy: kubectl apply -f 02-secret.local.yaml
# 4. Never commit your local copy — it is listed in .gitignore
# 5. In production, use Vault, Sealed Secrets, or External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: bmi-secrets
  namespace: production
type: Opaque
stringData:
  db-user: "<YOUR_DB_USER>"
  db-password: "<YOUR_DB_PASSWORD>"
  # Full connection string consumed directly by the Node.js backend (process.env.DATABASE_URL)
  database-url: "postgresql://<YOUR_DB_USER>:<YOUR_DB_PASSWORD>@postgres-service.production.svc.cluster.local:5432/bmidb"
