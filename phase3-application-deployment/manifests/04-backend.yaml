# ── Backend Deployment ─────────────────────────────────────────────────────────
# RollingUpdate strategy: zero-downtime deploys.
#   maxUnavailable: 0  — never drop below desired replicas during update
#   maxSurge: 1        — spin up one extra pod before terminating the old one
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
  labels:
    app: backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      serviceAccountName: backend-sa
      # Wait for postgres-service to be reachable before starting backend pods
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3;
              done
              echo "PostgreSQL is up."
      containers:
        - name: backend
          image: bmi-health/backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bmi-secrets
                  key: database-url
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: bmi-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: bmi-config
                  key: PORT
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: bmi-config
                  key: FRONTEND_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---
# ── Backend ClusterIP Service ──────────────────────────────────────────────────
# ClusterIP only — backend is not exposed externally; Kong routes /api to it.
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: production
  labels:
    app: backend
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: backend
    tier: backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
