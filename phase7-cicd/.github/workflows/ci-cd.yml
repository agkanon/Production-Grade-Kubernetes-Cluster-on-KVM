name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.sha }}
  DEPLOY_DIR: phase3-application-deployment

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build ${{ env.DEPLOY_DIR }}/backend -t bmi-backend:${{ env.IMAGE_TAG }}

      - name: Build frontend image
        run: docker build ${{ env.DEPLOY_DIR }}/frontend -t bmi-frontend:${{ env.IMAGE_TAG }}

      - name: Smoke test backend image
        run: docker run --rm bmi-backend:${{ env.IMAGE_TAG }} node --version

  push-images:
    name: Push Images to Registry
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.DEPLOY_DIR }}/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bmi-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bmi-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.DEPLOY_DIR }}/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bmi-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bmi-frontend:latest

  deploy:
    name: Deploy to Kubernetes
    needs: push-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Update backend image
        run: |
          kubectl set image deployment/backend \
            backend=${{ secrets.DOCKERHUB_USERNAME }}/bmi-backend:${{ env.IMAGE_TAG }} \
            -n production

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ secrets.DOCKERHUB_USERNAME }}/bmi-frontend:${{ env.IMAGE_TAG }} \
            -n production

      - name: Verify backend rollout
        run: kubectl rollout status deployment/backend -n production --timeout=120s

      - name: Verify frontend rollout
        run: kubectl rollout status deployment/frontend -n production --timeout=120s

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/backend -n production
          kubectl rollout undo deployment/frontend -n production
          kubectl rollout status deployment/backend -n production --timeout=120s
          kubectl rollout status deployment/frontend -n production --timeout=120s
