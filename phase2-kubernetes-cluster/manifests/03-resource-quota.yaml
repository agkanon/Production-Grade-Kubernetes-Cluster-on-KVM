# ── ResourceQuota and LimitRange — production namespace ─────────────────────
# ResourceQuota caps the total resources a namespace can consume, preventing
# any single namespace from starving the rest of the cluster.
# LimitRange injects per-container defaults — required when a ResourceQuota
# is active because Kubernetes rejects pods without resource fields.
# ───────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: production
  labels:
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: bmi-tracker
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    persistentvolumeclaims: 10
    count/secrets: 10
    count/configmaps: 10

---
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
  labels:
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/part-of: bmi-tracker
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
