#cloud-config
hostname: ${hostname}
fqdn: ${hostname}.kubernetes.local

# All package installation happens in runcmd, not here. cloud-init's
# package_update/package_upgrade/packages processing runs *before* runcmd —
# before netplan apply switches this VM off the image's default DHCP config
# onto our static IP+DNS. On a cold boot that ordering was observed to fail
# outright ("Temporary failure resolving 'archive.ubuntu.com'"), silently
# leaving everything in packages: uninstalled, including gnupg/ca-certificates
# that later runcmd steps (gpg --dearmor) depend on. See the package install
# block below, which runs only after network connectivity is confirmed.
package_update: false
package_upgrade: false

ssh_pwauth: false
disable_root: true

users:
  - name: ubuntu
    groups: [adm, sudo]
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_pub_key}

write_files:
  # Kernel modules required by Kubernetes and containerd
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
      sunrpc

  # Kubernetes-required sysctl parameters
  - path: /etc/sysctl.d/99-k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.bridge.bridge-nf-call-ip6tables=1
      net.ipv4.ip_forward=1
      net.ipv4.tcp_slow_start_after_idle=0
      fs.inotify.max_user_watches=524288
      fs.file-max=2097152
      vm.max_map_count=262144

  - path: /etc/security/limits.d/99-k8s.conf
    content: |
      * soft nofile 65535
      * hard nofile 65535
      * soft nproc 65535
      * hard nproc 65535

  # Static IP — gateway4 is deprecated in Ubuntu 24.04; use routes instead
  - path: /etc/netplan/99-static-ips.yaml
    content: |
      network:
        version: 2
        renderer: networkd
        ethernets:
          ens3:
            dhcp4: false
            addresses:
              - ${mgmt_ip}/24
            routes:
              - to: default
                via: ${mgmt_gateway}
            nameservers:
              addresses: [8.8.8.8, 8.8.4.4]
          ens4:
            dhcp4: false
            addresses:
              - ${storage_ip}/24

runcmd:
  # ── Kernel setup ────────────────────────────────────────────────────────────
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl -p /etc/sysctl.d/99-k8s.conf
  - netplan apply

  # netplan apply above switches ens3 from the image's default DHCP config to
  # our static IP. DNS (8.8.8.8) only becomes reachable once that switch lands,
  # which can race the very next apt/curl calls on a freshly booted VM and
  # produce "Temporary failure resolving" errors. Block here until resolution
  # actually works instead of hoping the timing works out.
  - |
    for i in $(seq 1 30); do
      getent hosts download.docker.com > /dev/null 2>&1 && break
      sleep 2
    done

  # ── Base packages (moved here from packages: — see note above) ──────────────
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y curl wget git vim net-tools htop sysstat jq openssl openssh-server chrony bridge-utils ebtables ethtool apt-transport-https ca-certificates gnupg nfs-common

  # ── Install containerd.io from Docker's official apt repo ───────────────────
  # Ubuntu 24.04 ships containerd (not containerd.io) which lacks full CRI support.
  # Docker's containerd.io package is always ahead on CRI API compatibility.
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  # Docker's repo now defaults to containerd.io 2.x, whose CRI plugin does not
  # answer the CRI v1 RuntimeService that kubeadm/cri-tools v1.32 expect
  # ("rpc error: ... unknown service runtime.v1.RuntimeService"). Pin to the
  # latest 1.7.x release — the line actually validated against kubeadm v1.32.
  - |
    CONTAINERD_VERSION=$(apt-cache madison containerd.io | awk '{print $3}' | grep '^1\.7\.' | sort -V | tail -1)
    apt-get install -y "containerd.io=$${CONTAINERD_VERSION}"

  # Generate the default config and enable SystemdCgroup (matches Ubuntu's cgroup v2 setup)
  - mkdir -p /etc/containerd
  - containerd config default | tee /etc/containerd/config.toml
  - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  - systemctl daemon-reload
  - systemctl enable containerd
  - systemctl restart containerd

  # ── Install Kubernetes v1.32 ─────────────────────────────────────────────────
  # Pin to v1.32 — the minor version that matches the rest of the cluster.
  # apt-mark hold prevents accidental upgrades that would break the cluster.
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - chmod 644 /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
  - apt-get update -qq
  - apt-get install -y kubeadm kubelet kubectl
  - apt-mark hold kubeadm kubelet kubectl
  - systemctl enable kubelet

  # ── Swap off (Kubernetes hard requirement) ───────────────────────────────────
  - swapoff -a
  - sed -i '/\sswap\s/d' /etc/fstab

  - systemctl restart ssh

final_message: "Control plane ${hostname} ready — containerd.io + kubeadm v1.32 installed"
