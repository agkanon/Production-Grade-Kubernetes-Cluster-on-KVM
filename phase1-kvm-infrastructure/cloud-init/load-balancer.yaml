#cloud-config
hostname: ${hostname}
fqdn: ${hostname}.kubernetes.local

package_update: true
package_upgrade: true
packages:
  - curl
  - wget
  - git
  - vim
  - net-tools
  - htop
  - sysstat
  - jq
  - openssl
  - openssh-server
  - chrony
  - haproxy
  - keepalived

ssh_pwauth: false
disable_root: true

users:
  - name: ubuntu
    groups: [adm, sudo]
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_pub_key}

write_files:
  - path: /etc/netplan/99-static-ips.yaml
    content: |
      network:
        version: 2
        renderer: networkd
        ethernets:
          ens3:
            dhcp4: false
            addresses:
              - ${mgmt_ip}/24
            routes:
              - to: default
                via: ${mgmt_gateway}
            nameservers:
              addresses: [8.8.8.8, 8.8.4.4]
          ens4:
            dhcp4: false
            addresses:
              - ${external_ip}/24

  - path: /etc/haproxy/haproxy.cfg
    content: |
      global
        log /dev/log    local0
        log /dev/log    local1 notice
        stats socket /run/haproxy/admin.sock mode 660 level admin
        stats timeout 30s
        user haproxy
        group haproxy

      defaults
        log     global
        mode    tcp
        option  tcplog
        option  dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000

      frontend k8s_frontend
        bind *:80
        mode tcp
        default_backend k8s_workers

      backend k8s_workers
        mode tcp
        balance roundrobin
        server w-01 192.168.1.20:30080 check
        server w-02 192.168.1.30:30080 check

  - path: /etc/sysctl.d/99-lb.conf
    content: |
      net.ipv4.ip_forward=1
      net.ipv4.ip_nonlocal_bind=1
      net.core.somaxconn=32768

runcmd:
  - sysctl -p /etc/sysctl.d/99-lb.conf
  - netplan apply
  - systemctl enable haproxy
  - systemctl restart ssh

final_message: "Load balancer ${hostname} is ready"
