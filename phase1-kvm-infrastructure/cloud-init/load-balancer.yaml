#cloud-config
hostname: ${hostname}
fqdn: ${hostname}.kubernetes.local

# All package installation happens in runcmd, not here — see the note in
# runcmd below. package_update/package_upgrade/packages run before netplan
# apply brings up static IP+DNS and were observed to fail outright on a cold
# boot ("Temporary failure resolving 'archive.ubuntu.com'"), which is how
# haproxy ended up silently missing despite write_files placing its config.
package_update: false
package_upgrade: false

ssh_pwauth: false
disable_root: true

users:
  - name: ubuntu
    groups: [adm, sudo]
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_pub_key}

write_files:
  - path: /etc/netplan/99-static-ips.yaml
    content: |
      network:
        version: 2
        renderer: networkd
        ethernets:
          ens3:
            dhcp4: false
            addresses:
              - ${mgmt_ip}/24
            routes:
              - to: default
                via: ${mgmt_gateway}
            nameservers:
              addresses: [8.8.8.8, 8.8.4.4]
          ens4:
            dhcp4: false
            addresses:
              - ${external_ip}/24

  - path: /etc/haproxy/haproxy.cfg
    content: |
      global
        log /dev/log    local0
        log /dev/log    local1 notice
        stats socket /run/haproxy/admin.sock mode 660 level admin
        stats timeout 30s
        user haproxy
        group haproxy

      defaults
        log     global
        mode    tcp
        option  tcplog
        option  dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000

      frontend k8s_frontend
        bind *:80
        mode tcp
        default_backend k8s_workers

      backend k8s_workers
        mode tcp
        balance roundrobin
        server w-01 192.168.1.20:30080 check
        server w-02 192.168.1.30:30080 check

  - path: /etc/sysctl.d/99-lb.conf
    content: |
      net.ipv4.ip_forward=1
      net.ipv4.ip_nonlocal_bind=1
      net.core.somaxconn=32768

runcmd:
  - sysctl -p /etc/sysctl.d/99-lb.conf
  - netplan apply

  # netplan apply above switches ens3 from the image's default DHCP config to
  # our static IP; DNS only becomes reachable once that lands. All packages
  # (not just haproxy) are installed here, not in packages:, since that list
  # runs before networking is reconfigured and was observed to fail outright
  # with "Temporary failure resolving 'archive.ubuntu.com'" on a cold boot,
  # which silently left haproxy uninstalled while write_files still dropped
  # the custom haproxy.cfg on disk.
  - |
    for i in $(seq 1 30); do
      getent hosts archive.ubuntu.com > /dev/null 2>&1 && break
      sleep 2
    done
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y curl wget git vim net-tools htop sysstat jq openssl openssh-server chrony keepalived qemu-guest-agent
  - systemctl enable --now qemu-guest-agent
  # --force-confold keeps the haproxy.cfg already placed by write_files
  # instead of prompting (and hanging, since this runs unattended) over the
  # package's own default config file at the same path.
  - DEBIAN_FRONTEND=noninteractive apt-get install -y -o Dpkg::Options::="--force-confold" haproxy

  - haproxy -c -f /etc/haproxy/haproxy.cfg -V
  - systemctl enable haproxy
  - systemctl restart haproxy
  - systemctl restart ssh

final_message: "Load balancer ${hostname} is ready"
